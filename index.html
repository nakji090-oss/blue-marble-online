<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>부루마불 온라인 - 프리미엄 랜드마크 에디션</title>
    <style>
        :root { --bg-color: #0b0f19; --board-bg: #1e293b; --cell-bg: #ffffff; --text-dark: #1e293b; }
        * { box-sizing: border-box; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; user-select: none; }
        body { margin: 0; padding: 10px; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #f8fafc; }
        
        .game-screen { display: none; width: 100%; max-width: 1280px; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .board-container { flex: 1 1 500px; max-width: 800px; width: 100%; aspect-ratio: 1 / 1; position: relative; }
        .board { width: 100%; height: 100%; display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); gap: 2px; background-color: var(--board-bg); padding: 4px; border: 6px solid #0284c7; border-radius: 12px; }

        .cell { background-color: var(--cell-bg); display: flex; flex-direction: column; align-items: center; justify-content: space-between; text-align: center; font-size: 8px; position: relative; overflow: hidden; border: 1px solid #e2e8f0; color: var(--text-dark); }
        .cell-name { font-weight: 800; font-size: 0.9em; margin-top: 2px; z-index: 2; word-break: keep-all; }
        .cell-price { font-weight: 850; color: #0f172a; z-index: 5; width: 100%; text-align: center; font-size: 9px; padding: 1px; background: rgba(255,255,255,0.8); }
        .cell-icon { width: 20px; height: 20px; margin: 1px 0; z-index: 2; }
        
        .center-space { grid-column: 2 / 11; grid-row: 2 / 11; background-color: #0b0f19; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; border-radius: 8px; }
        .globe-container { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #38bdf8, #0369a1); overflow: hidden; opacity: 0.8; }
        .dice-panel { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; }
        .btn-roll-center { background-color: #ef4444; color: white; padding: 12px 24px; border-radius: 30px; font-weight: 900; border: none; cursor: pointer; }
        
        /* 이전 CSS와 동일하게 유지 */
        .players-wrap { position: absolute; bottom: 2px; width: 100%; display: flex; justify-content: center; gap: 1px; z-index: 4; }
        .player-token { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; }
    </style>
</head>
<body>
    <div class="game-screen" id="game-screen" style="display: flex;">
        <div class="board-container">
            <div class="board" id="board">
                <div class="center-space">
                    <div class="dice-panel">
                        <div class="dice" id="dice1" style="background:#fff; padding:5px;">1</div>
                        <div class="dice" id="dice2" style="background:#fff; padding:5px;">1</div>
                    </div>
                    <button id="btn-roll-center" class="btn-roll-center" onclick="handleDiceClick()">주사위 굴리기</button>
                    <div class="globe-container"><div class="globe-map"></div></div>
                </div>
            </div>
        </div>
        <div class="controls"><div id="players-info"></div><div id="log"></div></div>
    </div>

    <script type="module">
        // (필수 firebase 설정은 이전과 동일하게 입력하세요)
        const icons = {
            fund: `<svg viewBox="0 0 24 24" fill="#fbbf24"><circle cx="12" cy="12" r="10"/></svg>`,
            tax: `<svg viewBox="0 0 24 24" fill="#ef4444"><path d="M12 2l9 4.5-9 4.5-9-4.5L12 2z"/></svg>`,
            travel: `<svg viewBox="0 0 24 24" fill="#3b82f6"><path d="M21 16.5l-9-9-9 9"/></svg>`,
            island: `<svg viewBox="0 0 24 24" fill="#64748b"><rect x="4" y="4" width="16" height="16"/></svg>`,
            key: `<svg viewBox="0 0 24 24" fill="#d97706"><path d="M12 2l3 3h-6l3-3z"/></svg>`
        };

        const formatMoney = (m) => new Intl.NumberFormat('ko-KR').format(m * 10000);

        function renderBoard() {
            boardData.forEach((data, i) => {
                const cell = document.getElementById(`cell-${i}`);
                let iconHtml = '';
                if (data.type === TYPES.FUND_RECV) iconHtml = `<div class="cell-icon">${icons.fund}</div>`;
                else if (data.type === TYPES.TAX) iconHtml = `<div class="cell-icon">${icons.tax}</div>`;
                else if (data.type === TYPES.TRAVEL) iconHtml = `<div class="cell-icon">${icons.travel}</div>`;
                else if (data.type === TYPES.ISLAND) iconHtml = `<div class="cell-icon">${icons.island}</div>`;
                else if (data.type === TYPES.KEY) iconHtml = `<div class="cell-icon">${icons.key}</div>`;

                let priceHtml = '';
                if (data.type === TYPES.CITY) {
                    priceHtml = `<div class="cell-price">${data.owner !== null ? formatMoney(getToll(i)) : formatMoney(data.price)}</div>`;
                } else if (data.type === TYPES.FUND_RECV) {
                    priceHtml = `<div class="cell-price" style="color:#d97706">${formatMoney(socialFund)}</div>`;
                }
                
                cell.innerHTML = `<div class="cell-name">${data.name}</div>${iconHtml}${priceHtml}<div class="players-wrap" id="players-${i}"></div>`;
            });
        }
    </script>
</body>
</html>
